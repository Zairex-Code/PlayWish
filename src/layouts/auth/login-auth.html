<!-- Login Auth Layout -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - PlayWish</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body class="bg-[#070b14] min-h-screen flex items-center justify-center font-sans text-white relative overflow-hidden">
    
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl -z-10"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl -z-10"></div>

    <div class="bg-[#0f172a]/90 backdrop-blur-md border border-gray-800 rounded-2xl p-8 max-w-md w-full shadow-2xl relative">

    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-white tracking-tight mb-2">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">PlayWish</span>
        </h2>
        <p id="auth-subtitle" class="text-gray-400 text-sm">Welcome back to Trench, explorer.</p>
    </div>

    <div class="flex bg-gray-900/50 rounded-lg p-1 mb-6 border border-gray-800/50">
        <button id="tab-login" class="flex-1 py-2 text-sm font-medium rounded-md bg-gray-800 text-white shadow transition-all">Log In</button>
        <button id="tab-register" class="flex-1 py-2 text-sm font-medium rounded-md text-gray-400 hover:text-white transition-all">Sign Up</button>
    </div>
    
    <form id="login-form" class="space-y-5 block">
        <div>
            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Username</label>
            <input type="text" id="login-username" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-cyan-400 focus:outline-none focus:ring-1 focus:ring-cyan-400" required>
        </div>

        <div>
            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Password</label>
            <input type="password" id="login-password" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-cyan-400 focus:outline-none focus:ring-1 focus:ring-cyan-400" required>
        </div>
        <button type="submit" class="w-full mt-6 bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-purple-500 text-white font-bold py-3 rounded-lg transition-transform transform hover:scale-[1.02]">
            Access Universe
        </button>

    </form>
    <form id="register-form" class="space-y-5 hidden">
        <div>
            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Username</label>
            <input type="text" id="reg-username" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-purple-400 focus:outline-none focus:ring-1 focus:ring-purple-400" required>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Email</label>
            <input type="email" id="reg-email" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-purple-400 focus:outline-none focus:ring-1 focus:ring-purple-400" required>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Password</label>
            <input type="password" id="reg-password" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-purple-400 focus:outline-none focus:ring-1 focus:ring-purple-400" required>
        </div>
        <button type="submit" class="w-full mt-6 bg-gradient-to-r from-purple-600 to-cyan-500 hover:from-purple-500 hover:to-cyan-400 text-white font-bold py-3 rounded-lg transition-transform transform hover:scale-[1.02]">
            Create Account
        </button>
        </form>
        
        <div class="mt-6 text-center">
        <a href="../../../index.html" class="text-sm text-gray-500 hover:text-cyan-400 transition-colors">← Back to Dashboard</a>
    </div>
  </div>

  <script type="module" src="./login-script.js"></script>
  <script type="module" src="./register-script.js"></script>
</body>
</html>
