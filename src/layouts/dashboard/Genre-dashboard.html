<div class="w-full mx-auto py-8 text-center" >
    <h2 class="text-2xl font-extrabold text-white leading-tight mb-8">Browse by Genre</h2>
</div>

<!-- Genre Container -->
<div class="relative group max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 overflow-hidden">
    <!-- Prev Button -->
    <button id="genre-prev" class="absolute left-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-gray-900/80 text-gray-400 hover:text-cyan-400 border border-gray-700 hover:border-cyan-500/50 transition-all duration-300 opacity-0 group-hover:opacity-100 backdrop-blur-sm shadow-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>

    <!-- Genre Track -->
    <div id="genre-track" class="flex gap-4 overflow-x-auto snap-x snap-mandatory pb-6 scroll-smooth [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
        <!-- Genre cards will be injected here -->
        <div class="flex items-center justify-center w-full py-10">
            <p class="text-cyan-400 font-bold animate-pulse">Loading genres...</p>
        </div>
    </div>

    <!-- Next Button -->
    <button id="genre-next" class="absolute right-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-gray-900/80 text-gray-400 hover:text-cyan-400 border border-gray-700 hover:border-cyan-500/50 transition-all duration-300 opacity-0 group-hover:opacity-100 backdrop-blur-sm shadow-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </button>
</div>
