<div class="w-full mx-auto py-6 text-white">

    <div class="relative w-full overflow-hidden rounded-3xl shadow-[0_0_40px_-15px_rgba(34,211,238,0.3)] border border-gray-800/80 group">

        <div id="carousel-track" class="flex transition-transform duration-700 ease-in-out h-100 md:h-125">
            
        </div>

        <!-- Botones Nativos -->
        <button id="btn-prev" class="absolute top-1/2 -translate-y-1/2 left-6 w-12 h-12 rounded-full bg-black/40 border border-gray-600 text-white flex items-center justify-center hover:bg-cyan-500 hover:border-cyan-400 hover:scale-110 active:scale-95 transition-all opacity-0 group-hover:opacity-100 backdrop-blur-md shadow-lg z-10">
